databaseChangeLog:
  - changeSet:
      id: 003-01-refresh-tokens
      author: travo
      comment: Persistent refresh tokens (opaque, hashed)
      changes:
        - createTable:
            tableName: refresh_token
            columns:
              - column: { name: id, type: uuid }
              - column: { name: user_id, type: uuid }
              - column: { name: token_hash, type: varchar(64) }
              - column: { name: created_at, type: timestamptz }
              - column: { name: expires_at, type: timestamptz }
              - column: { name: revoked_at, type: timestamptz }
        - addPrimaryKey:
            tableName: refresh_token
            columnNames: id
            constraintName: pk_refresh_token
        - addForeignKeyConstraint:
            baseTableName: refresh_token
            baseColumnNames: user_id
            constraintName: fk_refresh_token_user
            referencedTableName: app_user
            referencedColumnNames: id
        - addUniqueConstraint:
            tableName: refresh_token
            columnNames: token_hash
            constraintName: uk_refresh_token_hash
        - createIndex:
            tableName: refresh_token
            indexName: idx_refresh_token_user
            columns:
              - column: { name: user_id }